<section id="contact" class="section-padding reveal">
    <div class="container">
        <h2 class="section-title text-center">Get In Touch</h2>
        <p class="section-subtitle" style="margin: -1rem auto 2.5rem; text-align: center;">Have a project in mind? Let's talk about it.</p>

        <div class="contact-section">
            <form id="contact-form" onsubmit="sendEmail(event)">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" class="form-control" placeholder="Your name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" class="form-control" rows="5" placeholder="Tell me about your project..." required></textarea>
                </div>

                <button type="submit" class="btn-submit">
                    <span>Send Message</span>
                    <div id="form-indicator" class="htmx-indicator">
                        <i class="fas fa-spinner fa-spin"></i>
                    </div>
                </button>
            </form>

            <div class="cv-request">
                <h4>Request CV</h4>
                <p>If you'd like to request my CV, please mention it in your message above.</p>
            </div>
        </div>
    </div>
</section>
